<div class="flex h-screen w-full bg-gray-950 text-black overflow-hidden">
  <!-- Panel izquierdo: Catálogo -->
  <aside class="w-52 shrink-0 flex flex-col gap-3 p-4 bg-gray-900 border-r border-gray-700 z-10">
    <p class="text-xs font-semibold uppercase tracking-widest text-blue-400 mb-1">Catálogo</p>

    <div
      class="flex items-center gap-2 px-3 py-2 rounded-md bg-gray-800 border border-gray-700 text-sm cursor-grab select-none transition hover:bg-gray-700 hover:border-blue-500 active:cursor-grabbing"
      draggable="true"
      (dragstart)="onDragStart($event, 'default')"
    >
      <span>🔷</span> Nodo por defecto
    </div>

    <div
      class="flex items-center gap-2 px-3 py-2 rounded-md bg-gray-800 border border-gray-700 text-sm cursor-grab select-none transition hover:bg-gray-700 hover:border-blue-500 active:cursor-grabbing"
      draggable="true"
      (dragstart)="onDragStart($event, 'input')"
    >
      <span>📥</span> Nodo entrada
    </div>

    <div
      class="flex items-center gap-2 px-3 py-2 rounded-md bg-gray-800 border border-gray-700 text-sm cursor-grab select-none transition hover:bg-gray-700 hover:border-blue-500 active:cursor-grabbing"
      draggable="true"
      (dragstart)="onDragStart($event, 'output')"
    >
      <span>📤</span> Nodo salida
    </div>
  </aside>

  <!-- Canvas principal -->
  <div class="flex-1 h-full" (dragover)="onDragOver($event)" (drop)="onDrop($event)" #flowWrapper>
    <ngx-xyflow
      [nodes]="nodes()"
      [edges]="edges()"
      [elementsSelectable]="true"
      (onConnect)="onConnect($event)"
      (onNodeClick)="onNodeClick($event)"
    >
      <ngx-xyflow-background />
      <ngx-xyflow-controls />
      <ngx-xyflow-minimap />
      <ngx-xyflow-handle type="target" position="top" />
    </ngx-xyflow>
  </div>

  <!-- Panel derecho: Propiedades del nodo -->
  @if (selectedNode(); as node) {
    <aside
      class="w-72 shrink-0 flex flex-col bg-gray-900 border-l border-gray-700 z-10 overflow-y-auto"
    >
      <!-- Header -->
      <div class="flex items-center justify-between px-4 py-3 border-b border-gray-700">
        <p class="text-xs font-semibold uppercase tracking-widest text-blue-400">Propiedades</p>
        <button
          class="text-gray-500 hover:text-gray-200 transition text-lg leading-none"
          (click)="selectedNode.set(null)"
        >
          ✕
        </button>
      </div>

      <!-- Identificación -->
      <section class="px-4 py-4 border-b border-gray-700 flex flex-col gap-3">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Identificación</p>

        <div class="flex flex-col gap-1">
          <label class="text-xs text-gray-500">ID</label>
          <input
            class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm text-gray-300 cursor-not-allowed"
            [value]="node.id"
            readonly
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs text-gray-500">Etiqueta</label>
          <input
            class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-gray-100 focus:outline-none focus:border-blue-500"
            [value]="node.data?.['label'] ?? null"
            placeholder="Etiqueta del nodo"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs text-gray-500">Tipo</label>
          <span
            class="inline-flex self-start items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-900 text-blue-300 border border-blue-700"
            >{{ node.type ?? 'default' }}</span
          >
        </div>
      </section>

      <!-- Posición -->
      <section class="px-4 py-4 border-b border-gray-700 flex flex-col gap-3">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Posición</p>
        <div class="flex gap-3">
          <div class="flex flex-col gap-1 flex-1">
            <label class="text-xs text-gray-500">X</label>
            <input
              class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-gray-100 focus:outline-none focus:border-blue-500"
              type="number"
              [value]="node.position.x | number: '1.0-0'"
              placeholder="0"
            />
          </div>
          <div class="flex flex-col gap-1 flex-1">
            <label class="text-xs text-gray-500">Y</label>
            <input
              class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-gray-100 focus:outline-none focus:border-blue-500"
              type="number"
              [value]="node.position.y | number: '1.0-0'"
              placeholder="0"
            />
          </div>
        </div>
      </section>

      <!-- Apariencia (mock) -->
      <section class="px-4 py-4 border-b border-gray-700 flex flex-col gap-3">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Apariencia</p>

        <div class="flex flex-col gap-1">
          <label class="text-xs text-gray-500">Color de fondo</label>
          <div class="flex items-center gap-2">
            <input
              type="color"
              value="#3b82f6"
              class="w-8 h-8 rounded cursor-pointer bg-transparent border-0"
            />
            <input
              class="flex-1 bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-gray-100 focus:outline-none focus:border-blue-500"
              value="#3b82f6"
            />
          </div>
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs text-gray-500">Estilo de borde</label>
          <select
            class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-gray-100 focus:outline-none focus:border-blue-500"
          >
            <option>Sólido</option>
            <option>Punteado</option>
            <option>Discontinuo</option>
          </select>
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs text-gray-500">Opacidad</label>
          <input type="range" min="0" max="100" value="100" class="w-full accent-blue-500" />
        </div>
      </section>

      <!-- Acciones -->
      <section class="px-4 py-4 flex flex-col gap-2">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Acciones</p>
        <button
          class="flex items-center gap-2 px-3 py-2 rounded-md bg-gray-800 hover:bg-gray-700 border border-gray-700 text-sm transition"
        >
          📋 Duplicar nodo
        </button>
        <button
          class="flex items-center gap-2 px-3 py-2 rounded-md bg-gray-800 hover:bg-gray-700 border border-gray-700 text-sm transition"
        >
          🔗 Ver conexiones
        </button>
        <button
          class="flex items-center gap-2 px-3 py-2 rounded-md bg-red-900/40 hover:bg-red-900/70 border border-red-800 text-red-400 text-sm transition"
        >
          🗑 Eliminar nodo
        </button>
      </section>
    </aside>
  }
</div>

<ng-template #textUpdater>
  <div class="flex items-center gap-2">
    <input
      class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-gray-100 focus:outline-none focus:border-blue-500"
      [value]="selectedNode()?.data?.['label'] ?? null"
      placeholder="Etiqueta del nodo"
    />
    <button class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-white text-sm transition">
      Guardar
    </button>
  </div>
</ng-template>
