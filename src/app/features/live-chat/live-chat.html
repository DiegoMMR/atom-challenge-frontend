<!-- Shell principal: h-[100dvh] para móvil -->
<div
  class="flex flex-col h-dvh bg-zinc-100 dark:bg-zinc-900 font-sans antialiased"
>
  <!-- ═══════════════════════════ HEADER ═══════════════════════════ -->
  <header
    role="banner"
    class="flex-none flex items-center gap-3 px-4 py-3
           bg-white dark:bg-zinc-800
           border-b border-zinc-200 dark:border-zinc-700
           shadow-sm z-10"
  >
    <!-- Avatar -->
    <div
      class="relative flex-none w-10 h-10 rounded-full bg-emerald-500
             flex items-center justify-center shadow-md"
      aria-hidden="true"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="white"
        class="w-6 h-6"
      >
        <path
          d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2zm0 12c-5.33 0-8 2.67-8 4v1h16v-1c0-1.33-2.67-4-8-4z"
        />
      </svg>
      <!-- Indicador de estado (punto) -->
      <span
        class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2
               border-white dark:border-zinc-800
               transition-colors duration-300"
        [class]="
          isWaiting()
            ? 'bg-amber-400 animate-pulse'
            : 'bg-emerald-400'
        "
        aria-hidden="true"
      ></span>
    </div>

    <!-- Info -->
    <div class="flex-1 min-w-0">
      <p class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 leading-tight">
        Asistente API
      </p>
      <p
        class="text-xs transition-colors duration-300"
        [class]="
          isWaiting()
            ? 'text-amber-500 dark:text-amber-400'
            : 'text-emerald-500 dark:text-emerald-400'
        "
        [attr.aria-live]="'polite'"
      >
        {{ statusLabel() }}
      </p>
    </div>

    <!-- Botón reset -->
    <button
      type="button"
      (click)="resetChat()"
      title="Reiniciar conversación"
      aria-label="Reiniciar conversación"
      class="flex-none p-2 rounded-full text-zinc-400 dark:text-zinc-500
             hover:text-zinc-600 dark:hover:text-zinc-300
             hover:bg-zinc-100 dark:hover:bg-zinc-700
             focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500
             transition-colors duration-150"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="w-5 h-5"
        aria-hidden="true"
      >
        <polyline points="1 4 1 10 7 10" />
        <path d="M3.51 15a9 9 0 1 0 .49-4.95" />
      </svg>
    </button>
  </header>

  <!-- ═══════════════════════════ BODY ═══════════════════════════ -->
  <main
    class="flex-1 overflow-y-auto px-4 py-4 space-y-2 scroll-smooth"
    aria-label="Conversación"
  >
    <!-- Mensajes -->
    <div
      aria-live="polite"
      aria-atomic="false"
      aria-relevant="additions"
      class="flex flex-col gap-2"
    >
      @for (msg of messages(); track msg.id) {
        <div
          class="flex"
          [class]="msg.role === 'user' ? 'justify-end' : 'justify-start'"
        >
          <!-- Burbuja -->
          <div
            class="message-bubble flex flex-col max-w-[70%] gap-1"
          >
            <div
              class="px-4 py-2.5 text-sm leading-relaxed wrap-break-word whitespace-pre-wrap shadow-sm"
              [class]="
                msg.role === 'user'
                  ? 'bg-emerald-500 dark:bg-emerald-600 text-white
                     rounded-tl-2xl rounded-bl-2xl rounded-br-sm rounded-tr-2xl'
                  : 'bg-white dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100
                     rounded-tr-2xl rounded-br-2xl rounded-bl-sm rounded-tl-2xl'
              "
            >
              {{ msg.text }}
            </div>

            <!-- Footer de burbuja: timestamp + estado -->
            <div
              class="flex items-center gap-1.5"
              [class]="msg.role === 'user' ? 'justify-end' : 'justify-start'"
            >
              <span class="text-[10px] text-zinc-400 dark:text-zinc-500">
                {{ formatTime(msg.ts) }}
              </span>
              @if (msg.role === 'user' && msg.status === 'error') {
                <span
                  class="text-[10px] font-medium text-red-500 dark:text-red-400"
                  role="alert"
                >
                  ⚠ Error al enviar
                </span>
              }
            </div>
          </div>
        </div>
      }

      <!-- Typing indicator -->
      @if (isWaiting()) {
        <div class="flex justify-start">
          <div
            class="typing-bubble px-4 py-3 rounded-tr-2xl rounded-br-2xl rounded-bl-sm rounded-tl-2xl
                   bg-white dark:bg-zinc-800 shadow-sm"
            aria-label="El asistente está escribiendo"
          >
            <div class="flex items-center gap-1.5">
              <span class="typing-dot typing-dot-1 w-2 h-2 rounded-full bg-zinc-400 dark:bg-zinc-500"></span>
              <span class="typing-dot typing-dot-2 w-2 h-2 rounded-full bg-zinc-400 dark:bg-zinc-500"></span>
              <span class="typing-dot typing-dot-3 w-2 h-2 rounded-full bg-zinc-400 dark:bg-zinc-500"></span>
            </div>
          </div>
        </div>
      }
    </div>

    <!-- Anchor de scroll -->
    <div #endAnchor class="h-1" aria-hidden="true"></div>
  </main>

  <!-- ═══════════════ BANNER DE ERROR ═══════════════ -->
  @if (uiState().error) {
    <div
      role="alert"
      class="flex-none flex items-center justify-between gap-3
             px-4 py-2.5
             bg-red-50 dark:bg-red-950
             border-t border-red-200 dark:border-red-800
             text-red-700 dark:text-red-300 text-xs"
    >
      <div class="flex items-center gap-2 min-w-0">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          class="w-4 h-4 flex-none"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        <span class="truncate">{{ uiState().error }}</span>
      </div>
      <button
        type="button"
        (click)="retryLastMessage()"
        aria-label="Reintentar el último mensaje"
        class="flex-none flex items-center gap-1 px-3 py-1 rounded-full
               bg-red-100 dark:bg-red-900
               hover:bg-red-200 dark:hover:bg-red-800
               font-medium whitespace-nowrap
               focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-red-500
               transition-colors duration-150"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="w-3.5 h-3.5"
          aria-hidden="true"
        >
          <polyline points="1 4 1 10 7 10" />
          <path d="M3.51 15a9 9 0 1 0 .49-4.95" />
        </svg>
        Reintentar
      </button>
    </div>
  }

  <!-- ═══════════════════════════ FOOTER ═══════════════════════════ -->
  <footer
    role="contentinfo"
    class="flex-none flex items-end gap-2 px-3 py-3
           bg-white dark:bg-zinc-800
           border-t border-zinc-200 dark:border-zinc-700
           shadow-[0_-1px_4px_rgba(0,0,0,0.06)]"
  >
    <!-- Textarea -->
    <label class="sr-only" for="chatInput">Escribe un mensaje</label>
    <textarea
      #chatInput
      id="chatInput"
      name="chatInput"
      placeholder="Escribe un mensaje…"
      rows="1"
      [value]="inputText()"
      [disabled]="isWaiting()"
      (input)="handleInput($event)"
      (keydown)="handleKeydown($event)"
      class="chat-textarea flex-1 resize-none overflow-y-auto rounded-2xl px-4 py-2.5 text-sm
             bg-zinc-100 dark:bg-zinc-700
             text-zinc-900 dark:text-zinc-100
             placeholder-zinc-400 dark:placeholder-zinc-500
             border border-transparent
             focus:border-emerald-400 dark:focus:border-emerald-500
             focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400
             disabled:opacity-50 disabled:cursor-not-allowed
             transition-colors duration-150 leading-6"
      aria-label="Escribe un mensaje"
    ></textarea>

    <!-- Botón enviar -->
    <button
      type="button"
      (click)="sendMessage()"
      [disabled]="!canSend()"
      aria-label="Enviar mensaje"
      class="flex-none w-10 h-10 rounded-full flex items-center justify-center
             bg-emerald-500 dark:bg-emerald-600
             text-white shadow-md
             hover:bg-emerald-600 dark:hover:bg-emerald-500
             active:scale-95
             disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100
             focus-visible:outline-none focus-visible:ring-2
             focus-visible:ring-emerald-500 focus-visible:ring-offset-2
             focus-visible:ring-offset-white dark:focus-visible:ring-offset-zinc-800
             transition-all duration-150"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        class="w-5 h-5 translate-x-px"
        aria-hidden="true"
      >
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
      </svg>
    </button>
  </footer>
</div>
